name: Deploy Firestore rules

# Auto-deploys `firestore.rules` to the live Firebase project whenever
# the file changes on `main`. Saves a manual trip to the Firebase Console
# every time the rules are tightened.
#
# Setup (one-time): add a `FIREBASE_SERVICE_ACCOUNT` secret to the repo
# containing a JSON service-account key. See the PR that introduced this
# workflow for the exact steps.

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  deploy:
    name: firebase deploy --only firestore:rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Write service-account key to disk
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA_JSON" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$SA_JSON" > "$HOME/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --project northpixelsstudio --non-interactive
